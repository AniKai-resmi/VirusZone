<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>FNAF 1</title>

<style>
body{
    background:#0b0b0b;
    font-family:Arial;
    color:white;
    text-align:center;
    margin:0;
}

.kutu{
    margin-top:100px;
    background:#111;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 30px red;
    display:inline-block;
}

button{
    background:red;
    border:none;
    padding:15px 30px;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:darkred;
    transform:scale(1.1);
}

#uyari{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.uyari-kutu{
    background:#111;
    padding:40px;
    border:2px solid red;
    border-radius:15px;
    box-shadow:0 0 40px red;
}
</style>
</head>

<body>

<div class="kutu">
    <h1>FNAF 1 REW</h1>
    <p>İndirmek için butona bas</p>
    <button onclick="uyariAc()">İndir</button>
</div>

<div id="uyari">
    <div class="uyari-kutu">
        <h2>⚠️ UYARI</h2>
        <p>Bu APK virüslü olabilir.</p>
        <br>
        <button onclick="indir()">Eminim</button>
        <button onclick="kapat()">Hayır</button>
    </div>
</div>

<script>
function uyariAc(){
    document.getElementById("uyari").style.display="flex";
}

function kapat(){
    document.getElementById("uyari").style.display="none";
}

function indir(){
    window.location.href="https://www.dropbox.com/scl/fi/4wexis77t8ltcmmjv7dw8/five-nights-at-freddys-1-84.apk?dl=1";
}
</script>

</body>
</html>
